name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & Clippy (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libavfilter-dev \
            libavdevice-dev libasound2-dev libfontconfig-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang ffmpeg libavcodec-dev \
            libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libavfilter-dev libavdevice-dev libasound2-dev libfontconfig-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dépendances système
        run: |
          brew install ffmpeg pkg-config
          # ffmpeg-sys-next lit FFMPEG_DIR en priorité et l'utilise
          # directement (include/ + lib/), sans dépendre de pkg-config —
          # fiable face au keg Homebrew hors des chemins par défaut.
          echo "FFMPEG_DIR=$(brew --prefix ffmpeg)" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: FFmpeg (vcpkg)
        run: |
          vcpkg install ffmpeg[avcodec,avformat,swscale,swresample,avfilter,avdevice]:x64-windows
          echo "FFMPEG_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p oxiplay

  audit:
    name: Audit sécurité (CVE)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
