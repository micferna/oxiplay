name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format & Clippy (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libavfilter-dev \
            libavdevice-dev libasound2-dev libfontconfig-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang ffmpeg libavcodec-dev \
            libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libavfilter-dev libavdevice-dev libasound2-dev libfontconfig-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # macOS et Windows testent FFmpeg 8.x (Homebrew/BtbN), tandis que Linux
  # tourne sur la 7.1 de Debian : la matrice valide ainsi la compatibilité
  # FFmpeg 7 ET 8 offerte par ffmpeg-the-third.
  test-macos:
    name: Tests (macOS, FFmpeg 8)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dépendances système
        run: |
          brew install ffmpeg pkg-config
          echo "FFMPEG_DIR=$(brew --prefix ffmpeg)" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build-windows:
    name: Build (Windows, FFmpeg 8)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: FFmpeg 8.1 (build partagé BtbN)
        shell: pwsh
        run: |
          # Build partagé pré-compilé, bien plus rapide et fiable que vcpkg.
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg
          $dir = (Get-ChildItem C:\ffmpeg -Directory)[0].FullName
          echo "FFMPEG_DIR=$dir" >> $env:GITHUB_ENV
          echo "$dir\bin" >> $env:GITHUB_PATH
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p oxiplay

  audit:
    name: Audit sécurité (CVE)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
