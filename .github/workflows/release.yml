name: Release

# Déclenché par un tag `vX.Y.Z` (préreleases `vX.Y.Z-dev.N` incluses) :
# construit les artefacts Linux (.deb, tar.gz, AppImage) et Windows (.zip
# portable + installeur .msi, .exe signé si un certificat est fourni), tous avec
# le rendu GPU activé (repli GL), puis crée la release GitHub correspondante.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    name: Artefacts Linux (.deb, tar.gz, AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libavfilter-dev \
            libavdevice-dev libasound2-dev libfontconfig-dev file
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release (rendu GPU + repli GL)
        run: cargo build --release -p oxiplay --features gpu
      - name: Paquet .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p oxiplay --no-build
      - name: Archive tar.gz
        run: |
          mkdir -p dist/oxiplay
          cp target/release/oxiplay dist/oxiplay/
          cp README.md LICENSE CHANGELOG.md packaging/oxiplay.desktop dist/oxiplay/
          tar -C dist -czf "oxiplay-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" oxiplay
      - name: AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          mkdir -p AppDir/usr/bin
          cp target/release/oxiplay AppDir/usr/bin/
          cp packaging/oxiplay.desktop AppDir/
          cp crates/oxiplay/ui/icon.png AppDir/oxiplay.png
          # linuxdeploy embarque les bibliothèques partagées (FFmpeg, ALSA…).
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e AppDir/usr/bin/oxiplay \
            -d AppDir/oxiplay.desktop -i AppDir/oxiplay.png \
            --output appimage
          mv OxiPlay*-x86_64.AppImage "OxiPlay-${GITHUB_REF_NAME}-x86_64.AppImage"
        env:
          NO_STRIP: "1"
      - name: Release GitHub
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            target/debian/*.deb
            oxiplay-*-linux-x86_64.tar.gz
            OxiPlay-*-x86_64.AppImage

  windows:
    name: Artefacts Windows (.zip + .msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      # Setup FFmpeg identique à celui de la CI (ci.yml), seul éprouvé.
      - name: FFmpeg 8.1 (build partagé BtbN)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg
          $dir = (Get-ChildItem C:\ffmpeg -Directory)[0].FullName
          echo "FFMPEG_DIR=$dir" >> $env:GITHUB_ENV
          echo "$dir\bin" >> $env:GITHUB_PATH
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release (rendu GPU + repli GL)
        run: cargo build --release -p oxiplay --features gpu
      - name: Bundle (.exe + DLLs FFmpeg)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\oxiplay.exe dist\
          Copy-Item "$env:FFMPEG_DIR\bin\*.dll" dist\
          Copy-Item README.md, LICENSE, CHANGELOG.md dist\
      # Signature Authenticode — UNIQUEMENT si un certificat est fourni en
      # secret (base64 d'un .pfx + mot de passe). Sans cela, l'étape est sautée
      # (le .exe reste non signé). Un certificat de signature de code OV/EV
      # auprès d'une autorité reconnue est nécessaire pour réduire les
      # avertissements SmartScreen et les faux positifs antivirus.
      - name: Signature Authenticode (si certificat fourni)
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:CERT_B64) {
            Write-Host "Pas de certificat (secret WINDOWS_CERT_BASE64 absent) : .exe non signé."
            exit 0
          }
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CERT_B64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1).FullName
          & $signtool sign /f cert.pfx /p $env:CERT_PW `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist\oxiplay.exe
          Remove-Item cert.pfx
      - name: Archive zip (portable)
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath "oxiplay-$env:GITHUB_REF_NAME-windows-x86_64.zip"
      - name: Installeur .msi (WiX)
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $bin = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\heat.exe" |
            Sort-Object FullName | Select-Object -Last 1).DirectoryName
          # Version numérique pour l'MSI : « v0.2.0-dev.5 » → « 0.2.0 ».
          $ver = ($env:GITHUB_REF_NAME -replace '^v', '' -replace '-.*$', '')
          # Récolte tout le contenu de dist\ (exe + DLLs + docs) en composants.
          & "$bin\heat.exe" dir dist -cg AppFiles -dr INSTALLFOLDER -srd -sreg -gg `
            -var var.DistDir -out AppFiles.wxs
          # Guillemets obligatoires pour que pwsh expanse $ver dans l'argument.
          & "$bin\candle.exe" -arch x64 "-dVersion=$ver" "-dDistDir=dist" `
            packaging\windows\oxiplay.wxs AppFiles.wxs
          if ($LASTEXITCODE -ne 0) { throw "candle a échoué" }
          # light lie les .wixobj produits par candle (pas les .wxs).
          & "$bin\light.exe" -sval -o "oxiplay-$env:GITHUB_REF_NAME-windows-x86_64.msi" `
            oxiplay.wixobj AppFiles.wixobj
          if ($LASTEXITCODE -ne 0) { throw "light a échoué" }
      - name: Release GitHub
        uses: softprops/action-gh-release@v3
        with:
          files: |
            oxiplay-*-windows-x86_64.zip
            oxiplay-*-windows-x86_64.msi
