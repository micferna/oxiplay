name: Release

# Déclenché par un tag `vX.Y.Z` : construit les artefacts Linux
# (.deb + tar.gz) et crée la release GitHub correspondante.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    name: Artefacts Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libavcodec-dev libavformat-dev \
            libavutil-dev libswscale-dev libswresample-dev libavfilter-dev \
            libavdevice-dev libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release -p oxiplay
      - name: Paquet .deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p oxiplay --no-build
      - name: Archive tar.gz
        run: |
          mkdir -p dist/oxiplay
          cp target/release/oxiplay dist/oxiplay/
          cp README.md LICENSE CHANGELOG.md packaging/oxiplay.desktop dist/oxiplay/
          tar -C dist -czf "oxiplay-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" oxiplay
      - name: Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/debian/*.deb
            oxiplay-*-linux-x86_64.tar.gz
